$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "job.yaml"
x-schema-version: 1
type: object

# ---------------------------------------------------------------------------
# The Job is the single live thing being processed. It is not a named library
# item — there is exactly one, so it is a singleton (like settings/stock) with
# no id and no name. It references ONE machining profile (whose ordered steps
# describe the work) and, in future, will also carry the last-minute/live data
# for the current session.
#
#   Job → Machining profile → CNC / Fixture / Toolset
# ---------------------------------------------------------------------------

properties:
  schema_version:
    type: integer
    const: 1
    default: 1

  machining_profile:
    description: The machining profile this job runs (its ordered steps).
    $ref: "id.yaml#/$defs/uuid_v7"
    x-ref: "machining.yaml"

  board_orientation:
    description: >-
      Board placement angle in degrees for this run. Live per-job data — it lets
      the board be rotated to fit the CNC bed and is NOT a profile setting (the
      same board on a different bed may need a different angle).
    type: integer
    minimum: -180
    maximum: 180
    default: 0

required: [schema_version]

additionalProperties: false
