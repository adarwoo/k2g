$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "stock.yaml"
x-schema-version: 1

title: Tool Stock
description: >
  Persisted user tool stock inventory. Stock items are application-managed
  records, usually created from catalog tools, then customized by the user.

  Each stock item has its own UUIDv7 id because it is mutable user-owned state.

  `base` holds an immutable snapshot of the tool's original (catalog-derived)
  values, captured when the item is created; it keeps the tool operational even
  if the source catalog is later missing. `overrides` holds the user's local
  edits. The effective value of a field is its override, falling back to `base`;
  a field is "changed" when its override differs from `base`, and reverting it
  drops the override.

  Catalog tools have no maintained id, so no id-based reference back to the
  catalog is kept — only the catalog's name (`source_catalog`), for display.

  This schema references shared definitions from files located in the same
  directory:
    - id.yaml
    - units.yaml

type: object

$defs:

  # ---------------------------------------------------------------------------
  # tool_values
  # ---------------------------------------------------------------------------
  # Tool characteristics and recommended machining parameters.
  #
  # Used both for:
  #   - base: persisted catalog snapshot
  #   - overrides: user-customized local values
  #
  # For `base`, the application should store the complete catalog-derived tool
  # definition needed to keep the stock item operational if the catalog is
  # missing.
  #
  # For `overrides`, fields are optional. A missing field means inherit from the
  # current catalog item when available, otherwise inherit from `base`.
  #
  tool_values:
    type: object
    properties:

      # Display name.
      name:
        type: string
        minLength: 1
        description: Tool display name.

      # Tool type/family.
      kind:
        type: string
        enum: [drillbit, routerbit, endmill, engraver, vbit]
        description: Tool family/type.

      # Manufacturer and SKU metadata.
      manufacturer:
        anyOf:
          - type: string
            minLength: 1
          - type: "null"
        description: Manufacturer name.
      sku:
        anyOf:
          - type: string
            minLength: 1
          - type: "null"
        description: Manufacturer SKU or part number.

      # Geometry.
      diameter:
        description: Nominal tool diameter.
        $ref: "units.yaml#/$defs/size"
      tip_diameter:
        anyOf:
          - $ref: "units.yaml#/$defs/size"
          - type: "null"
        description: Tip diameter, important for engravers and V-bits.
      flute_length:
        anyOf:
          - $ref: "units.yaml#/$defs/size"
          - type: "null"
        description: Flute length.
      z_min_depth:
        anyOf:
          - $ref: "units.yaml#/$defs/size"
          - type: "null"
        description: Minimum useful/recommended cutting or drilling depth.
      point_angle:
        anyOf:
          - $ref: "units.yaml#/$defs/angle"
          - type: "null"
        description: Tool point angle.

      # Recommended machining parameters.
      spindle:
        anyOf:
          - $ref: "units.yaml#/$defs/rpm"
          - type: "null"
        description: Recommended spindle speed.
      z_feed:
        anyOf:
          - $ref: "units.yaml#/$defs/feed"
          - type: "null"
        description: Recommended Z/plunge feed.
      table_feed:
        anyOf:
          - $ref: "units.yaml#/$defs/feed"
          - type: "null"
        description: Recommended XY/table feed.

      # Free-text note.
      notes:
        anyOf:
          - type: string
          - type: "null"
        description: Notes about material, coating, conditions, or caveats.

    additionalProperties: false

properties:

  # Version of this schema
  schema_version:
    type: integer
    const: 1
    description: Schema/data format version for this file.

  # ---------------------------------------------------------------------------
  # tools
  # ---------------------------------------------------------------------------
  # List of tools in the current stock inventory.
  #
  tools:
    type: array
    default: []
    description: List of tools in the current stock inventory.
    items:
      type: object
      description: A single user-managed stock tool.
      properties:

        # Local stock item ID.
        #
        id:
          description: Unique application-managed stock item ID.
          $ref: "id.yaml#/$defs/uuid_v7"

        # Name of the catalog the tool was created from (display only). Catalog
        # tools have no maintained id, so no id-based reference is kept.
        #
        source_catalog:
          anyOf:
            - type: string
              minLength: 1
            - type: "null"
          description: Name of the catalog this tool was created from, for display.

        # Persisted catalog snapshot.
        #
        # This is what keeps the stock item operational if the catalog or item
        # cannot be found later.
        #
        base:
          description: Catalog-derived snapshot stored with the stock item.
          $ref: "#/$defs/tool_values"

        # Local user overrides.
        #
        # Missing fields inherit from current catalog item if available,
        # otherwise from base.
        #
        overrides:
          description: User overrides relative to catalog/base values.
          $ref: "#/$defs/tool_values"
          default: {}

        # Cached/generated summary for display.
        summary:
          anyOf:
            - type: string
            - type: "null"
          description: Cached or auto-generated summary such as type plus diameter.

        # Stock availability.
        availability:
          type: string
          enum: [in_stock, out_of_stock]
          default: in_stock
          description: Availability status in the user's stock.

        # Automatic selection preference.
        preference:
          type: string
          enum: [preferred, neutral, not_preferred]
          default: neutral
          description: Selection preference for automatic matching.

        # Internal insertion order for deterministic display.
        order:
          anyOf:
            - type: integer
              minimum: 0
            - type: "null"
          description: Internal insertion precedence for deterministic ordering.

      required:
        - id
        - base
        - availability
        - preference
      additionalProperties: false

required:
  - tools

additionalProperties: false
