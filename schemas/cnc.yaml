$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "cnc.yaml"
x-schema-version: 1

title: CNC Profile
description: >
  CNC profile persisted configuration. This file controls the emitted GCode
  for a CNC machine. The `primitives` templates are written in the GCode
  Template Language (GTL): a line starting with a backtick emits GCode, every
  other line is Rhai script, and `{expr}` inside an emit line is evaluated and
  unit-converted. See docs/gcode-template-language.md for the full grammar.

  This schema references shared UUID and unit definitions from files located in
  the same directory:
    - id.yaml
    - units.yaml

type: object

properties:

  # Version of this schema
  schema_version:
    type: integer
    const: 1
    description: Schema/data format version for this file.

  # ---------------------------------------------------------------------------
  # id
  # ---------------------------------------------------------------------------
  # Stable unique CNC profile identifier.
  #
  # Uses the shared UUIDv7 validator from id.yaml.
  #
  # Valid example:
  #   id: "01890fdb-4daf-7a37-8f6a-9dc397e5b4ef"
  #
  id:
    description: Unique CNC profile ID.
    $ref: "id.yaml#/$defs/uuid_v7"

  # ---------------------------------------------------------------------------
  # name
  # ---------------------------------------------------------------------------
  # Human-readable CNC profile name.
  #
  # Valid examples:
  #   name: "Genmitsu 3018-Pro"
  #   name: "Masso G3 - With ATC"
  #
  name:
    description: User-facing CNC profile name.
    type: string
    minLength: 1
    default: "My CNC profile"

  # ---------------------------------------------------------------------------
  # machine
  # ---------------------------------------------------------------------------
  # Physical machine configuration.
  #
  machine:
    description: Physical machine configuration.
    type: object
    properties:

      # -----------------------------------------------------------------------
      # max_feed_rate
      # -----------------------------------------------------------------------
      # Maximum configured feed rate.
      #
      # Uses the shared feed validator from units.yaml.
      #
      # Valid examples:
      #   max_feed_rate: "2000 mm/min"
      #   max_feed_rate: "2000mm/min"
      #   max_feed_rate: "78.74 in/min"
      #   max_feed_rate: "78.74 ipm"
      #
      max_feed_rate:
        description: Maximum feed rate.
        default: "2000mm/min"
        $ref: "units.yaml#/$defs/feed"

      # -----------------------------------------------------------------------
      # spindle_rpm_min
      # -----------------------------------------------------------------------
      # Minimum spindle speed. Unit is optional and defaults to RPM in the
      # application.
      #
      # Valid examples:
      #   spindle_rpm_min: 1000
      #   spindle_rpm_min: "1000"
      #   spindle_rpm_min: "1000 rpm"
      #   spindle_rpm_min: "1000rpm"
      #
      spindle_rpm_min:
        description: Minimum spindle speed. Bare numbers are interpreted as rpm.
        default: "10000rpm"
        $ref: "units.yaml#/$defs/rpm"

      # -----------------------------------------------------------------------
      # spindle_rpm_max
      # -----------------------------------------------------------------------
      # Maximum spindle speed. Unit is optional and defaults to RPM in the
      # application.
      #
      # Valid examples:
      #   spindle_rpm_max: 24000
      #   spindle_rpm_max: "24000"
      #   spindle_rpm_max: "24000 rpm"
      #   spindle_rpm_max: "24000rpm"
      #
      spindle_rpm_max:
        description: Maximum spindle speed. Bare numbers are interpreted as rpm.
        default: "24000rpm"
        $ref: "units.yaml#/$defs/rpm"

      # -----------------------------------------------------------------------
      # atc_slot_count
      # -----------------------------------------------------------------------
      # Number of automatic tool changer slots.
      #
      # 0 means ATC is disabled and manual tool change is used.
      #
      # Valid examples:
      #   atc_slot_count: 0
      #   atc_slot_count: 12
      #
      atc_slot_count:
        description: Number of ATC slots. 0 means ATC is disabled.
        type: integer
        minimum: 0
        default: 0

      # -----------------------------------------------------------------------
      # scaling
      # -----------------------------------------------------------------------
      # Axis scaling factors.
      #
      # 1.0 means no scaling.
      #
      scaling:
        description: >
          Axis scaling multipliers. A value of 1.0 means no scaling.
          Values are applied as output = input * scaling.

        type: object
        properties:

          # X axis scaling multiplier.
          #
          # Valid examples:
          #   x: 1.0
          #   x: 0.9995
          #
          x:
            description: X axis scaling multiplier.
            type: number
            default: 1.0

          # Y axis scaling multiplier.
          #
          # Valid examples:
          #   y: 1.0
          #   y: 1.0002
          #
          y:
            description: Y axis scaling multiplier.
            type: number
            default: 1.0

        required: [x, y]
        additionalProperties: false

      # -----------------------------------------------------------------------
      # line_numbering_increment
      # -----------------------------------------------------------------------
      # Program line numbering increment.
      #
      # 0 disables line numbering.
      #
      # Valid examples:
      #   line_numbering_increment: 0
      #   line_numbering_increment: 10
      #
      line_numbering_increment:
        description: Program line numbering increment. 0 means none.
        type: integer
        minimum: 0
        default: 10

    required:
      - max_feed_rate
      - spindle_rpm_min
      - spindle_rpm_max
      - atc_slot_count
      - scaling
      - line_numbering_increment

    additionalProperties: false

# ---------------------------------------------------------------------------
  # primitives
  # ---------------------------------------------------------------------------
  # Primitive templates written in the GCode Template Language (GTL); see
  # docs/gcode-template-language.md for the full grammar.
  #
  # Emit vs script:
  #   - A line whose first non-whitespace character is a backtick (`) emits
  #     GCode. Every other line is Rhai script (loops, conditionals, variables).
  #   - Inside an emit line, {expr} is evaluated in scope and spliced in,
  #     converted to the active output unit. Example:  `G0 X{x} Y{y}
  #   - Braces delimit, so no spaces are needed between fields: `X{x}Y{y}`.
  #     A literal brace is doubled: {{ or }}.
  #
  # Unit model:
  #   - Call metric() (emits G21) or imperial() (emits G20), normally once in
  #     initialise. That call fixes how every later value is formatted and
  #     mirrors the machine's own modal state, so the author never tracks units.
  #   - Display precision follows the active unit system automatically.
  #   - Values keep their unit type in script logic, so `z - z_step` and
  #     `z > z_bottom` are unit-correct; conversion to a number happens only at
  #     emit. Force a specific unit with an accessor: {z_safe.mm}, {z_safe.inch}.
  #
  # Example (a multi-pass depth loop, e.g. cutting to depth in steps):
  #
  #     `G0 X{x} Y{y}
  #     `G0 Z{z_retract}
  #     let z = z_retract;
  #     while z > z_bottom {
  #         z = max(z - z_step, z_bottom);
  #         `G1 Z{z} F{z_feedrate}
  #         `G0 Z{z_retract}
  #     }
  #
  # Notes:
  #   - These templates are strings; this schema validates their presence and
  #     type, not whether each script is semantically valid. The application
  #     compiles/evaluates them separately when loading or editing the profile.
  #
  primitives:
    description: Primitive templates in the GCode Template Language (backtick lines emit GCode; other lines are Rhai script). See docs/gcode-template-language.md.
    type: object
    properties:

      # Program initialization block.
      #
      # Expected placeholders include:
      #   {pcb_filename}
      #   {timestamp}
      #   {z_safe}
      #
      # Calls metric() to establish millimetre output (emits G21) before any
      # coordinate is emitted.
      #
      initialise:
        description: Program initialization block.
        type: string
        # Additional variables in scope for this primitive's GTL, beyond the shared
        # emit/fmt()/metric() surface. Read by the primitive editor's reference panel
        # and its validate/preview (the generation scopes are built to match).
        x-variables:
          - { name: pcb_filename, type: string, description: "Source KiCad PCB file name." }
          - { name: timestamp, type: string, description: "Program generation time (local clock)." }
          - { name: z_safe, type: length, description: "Safe Z height to retract to, clear of the work and fixtures." }
        default: |
          `(Created by kicad2gcode from '{pcb_filename}' - {timestamp})
          `(Reset all back to safe defaults)
          `G17 G54 G40 G49 G80 G90
          metric();
          `G10 P0
          `(Establish the Z-Safe)
          `G0 Z{z_safe}

      # Rapid positioning move primitive.
      #
      # Expected placeholders include:
      #   {x}
      #   {y}
      #   {z}
      #
      rapid_move:
        description: Positioning move primitive. Takes x, y, and z.
        type: string
        x-variables:
          - { name: x, type: length, description: "Target X coordinate." }
          - { name: y, type: length, description: "Target Y coordinate." }
          - { name: z, type: length, description: "Target Z coordinate." }
        default: "`G0 X{x} Y{y} Z{z}"

      # Linear cutting move primitive.
      #
      # Expected placeholders include:
      #   {x}
      #   {y}
      #   {z}
      #   {s}
      #
      linear_cut:
        description: Linear cutting primitive. Takes x, y, z, and s.
        type: string
        x-variables:
          - { name: x, type: length, description: "Target X coordinate." }
          - { name: y, type: length, description: "Target Y coordinate." }
          - { name: z, type: length, description: "Target Z coordinate." }
          - { name: s, type: rpm, description: "Spindle speed for the cut." }
        default: "`G1 X{x} Y{y} Z{z} S{s}"

      # Start spindle primitive.
      #
      # Expected placeholders include:
      #   {rpm}
      #
      start_spindle:
        description: Start spindle primitive.
        type: string
        x-variables:
          - { name: rpm, type: rpm, description: "Spindle speed to command." }
        default: |
          `S{rpm}
          `M03

      # Stop spindle primitive.
      #
      stop_spindle:
        description: Stop spindle primitive.
        type: string
        x-variables: []
        default: "`M05"

      # Drill cycle primitive.
      #
      # Expected placeholders include:
      #   {x}
      #   {y}
      #   {z_bottom}
      #   {z_retract}
      #   {z_feedrate}
      #
      drill:
        description: Drill primitive template.
        type: string
        x-variables:
          - { name: x, type: length, description: "Hole X coordinate." }
          - { name: y, type: length, description: "Hole Y coordinate." }
          - { name: z_bottom, type: length, description: "Z depth at the bottom of the hole." }
          - { name: z_retract, type: length, description: "Z retract (R plane) between holes." }
          - { name: z_feedrate, type: feed, description: "Plunge feed rate." }
        default: "`G81 X{x} Y{y} Z{z_bottom} R{z_retract} F{z_feedrate}"

      # Arc cutting primitive.
      #
      # Expected placeholders include:
      #   {arc_cmd}
      #   {x}
      #   {y}
      #   {i}
      #   {j}
      #   {xy_feedrate}
      #
      cut_arc:
        description: Arc cutting primitive template.
        type: string
        x-variables:
          - { name: arc_cmd, type: string, description: "Arc direction command (G2 clockwise / G3 counter-clockwise)." }
          - { name: x, type: length, description: "Arc end-point X coordinate." }
          - { name: y, type: length, description: "Arc end-point Y coordinate." }
          - { name: i, type: length, description: "Arc centre X offset from the start point." }
          - { name: j, type: length, description: "Arc centre Y offset from the start point." }
          - { name: xy_feedrate, type: feed, description: "Cutting feed rate in the XY plane." }
        default: "`{arc_cmd} X{x} Y{y} I{i} J{j} F{xy_feedrate}"

      # Bezier cutting primitive.
      #
      # May be native GCode for a controller that supports it, or a placeholder
      # for expansion into arcs/segments by the application.
      #
      cut_bezier:
        description: Bezier primitive template. May be native or an approximation sequence.
        type: string
        x-variables: []
        default: |
          `; cut_bezier fallback
          `; implementation may expand into one or more arc segments

      # Tool change primitive.
      #
      # Expected placeholders include:
      #   {manual_message}
      #   {slot}
      #   {rpm}
      #
      change_tool:
        description: Tool change primitive template.
        type: string
        x-variables:
          - { name: manual_message, type: string, description: "Operator prompt shown for a manual tool change." }
          - { name: slot, type: integer, description: "Target tool/rack slot number." }
          - { name: rpm, type: rpm, description: "Spindle speed to resume after the change." }
        default: |
          `M05
          `{manual_message}
          `T{slot} M06
          `S{rpm}

      # Program finalization block.
      #
      conclude:
        description: Program conclude/finalization block.
        type: string
        x-variables: []
        default: |
          `(end of file)

      # Optional pause/message primitive.
      #
      # Expected placeholders include:
      #   {message}
      #
      pause:
        description: Optional pause/message insertion primitive.
        type: string
        x-variables:
          - { name: message, type: string, description: "Message shown to the operator at the pause." }
        default: |
          `MSG {message}
          `M01

      # Optional comment/banner primitive.
      #
      # Expected placeholders include:
      #   {text}
      #
      banner:
        description: Optional comment/banner insertion primitive.
        type: string
        x-variables:
          - { name: text, type: string, description: "Banner/comment text to insert." }
        default: "`( {text} )"

    required:
      - initialise
      - rapid_move
      - linear_cut
      - start_spindle
      - stop_spindle
      - drill
      - cut_arc
      - cut_bezier
      - change_tool
      - conclude

    additionalProperties: false

required:
  - id
  - name
  - machine
  - primitives

additionalProperties: false
