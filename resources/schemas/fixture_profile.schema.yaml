$schema: "http://json-schema.org/draft-07/schema#"
type: object
description: Fixture profile persisted configuration.

properties:
  id:
    type: string
    minLength: 1
    description: Unique fixture profile ID.
  name:
    type: string
    minLength: 1
    description: Fixture profile name.
  board_holding_method:
    type: string
    description: Supported board holding method.
  backboard_thickness:
    description: |
      Thickness of the back/martyr/exit-board.
      WARNING: Make sure this value is always accurate, otherwise, you run the
      risk of drilling into the machining bed.
    unit: length
    default: 2.5mm
  work_origin_reference:
    type: object
    description: Work origin/reference definition.
    properties:
      x0:
        type: string
        enum: [Left, Right, Front, Back]
      y0:
        type: string
        enum: [Front, Back, Left, Right]
      z0_reference:
        type: string
    required: [x0, y0]
    additionalProperties: false
  locating_pins:
    type: object
    description: Locating pin strategy and geometry.
    properties:
      strategy:
        type: string
      pin_diameter:
        type: [number, string]
      pin_positions:
        type: array
        items:
          type: object
          properties:
            x:
              type: [number, string]
            y:
              type: [number, string]
          required: [x, y]
          additionalProperties: false
    additionalProperties: true
  keep_out_zones:
    type: array
    description: Keep-out or clamp zones.
    items:
      type: object
      properties:
        x:
          type: [number, string]
        y:
          type: [number, string]
        width:
          type: [number, string]
        height:
          type: [number, string]
        z_safe_height:
          description: |
            Z distance to retract to between machining operations. This distance should
            be well clear of fixtures on the machining table to avoid collisions.
            WARNING: The Z0 correspond to the machining bed. So it can be set from machine
            coordinates and does not need adjusting.
          unit: length
          anyOf:
            - type: number
            - *length_string
          default: 20mm
        z_drill_retract_height:
          description: |
            Known as R value, the distance to retract to between drilling operations
            that is the distance from the top of the machining bed upwards.
            If you have a pressure place, this distance should allow the plate
            to spring back to neutral position and to allow for hovering over
            any fixtures on the table
          unit: length
          anyOf:
            - type: number
            - *length_string
          default: 10mm
      required: [x, y, width, height, z_safe_height, z_drill_retract_height]
      additionalProperties: false
  occupancy:
    type: object
    description: Fixture occupancy impact on board size range.
    properties:
      max_board_x:
        type: [number, string]
      max_board_y:
        type: [number, string]
      blocked_regions:
        type: array
        items:
          type: object
    additionalProperties: true
  probing_alignment:
    type: object
    description: Optional probing/alignment parameters.
    properties:
      enabled:
        type: boolean
        default: false
      probe_points:
        type: array
        items:
          type: object
          properties:
            x:
              type: [number, string]
            y:
              type: [number, string]
          required: [x, y]
          additionalProperties: false
    additionalProperties: true

required: [id, name, board_holding_method, work_origin_reference, locating_pins, keep_out_zones, occupancy]
additionalProperties: false
