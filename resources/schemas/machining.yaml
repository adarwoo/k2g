$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "machining.yaml"
x-schema-version: 2
type: object

$defs:
  operation_key:
    type: string
    enum:
      - drill_locating_pins
      - drill_pth
      - drill_npth
      - route_board
      - mill_board

  drill_holes_common:
    type: object
    default:
      holes:
        route_fallback: false
        drill_first: true
        pilot: false
        oblong: drill_ends_then_route
        oversize:
          relative: 8%
          max: 0.10mm
        undersize:
          relative: 6%
          max: 0.08mm
    properties:
      holes:
        type: object
        default:
          route_fallback: false
          drill_first: true
          pilot: false
          oblong: drill_ends_then_route
          oversize:
            $ref: "#/$defs/allowance"
          undersize:
            $ref: "#/$defs/allowance"
        properties:
          route_fallback: { type: boolean, default: false }
          drill_first: { type: boolean, default: true }
          pilot: { type: boolean, default: false }
          oblong:
            type: string
            default: drill_ends_then_route
            enum: [route, drill_ends_then_route, drill_chain, drill_chain_then_route]
        additionalProperties: false
    required: [holes]
    additionalProperties: false

  route_board:
    type: object
    default:
      edge:
        cut: route
        retention: tabs
        tabs: 4
        tab_width: 2.0mm
        bite_holes: 3
      finishing:
        clearance: 0.1mm
        direction: climb
    properties:
      edge:
        type: object
        default:
          cut: route
          retention: tabs
          tabs: 4
          tab_width: 2.0mm
          bite_holes: 3
        properties:
          cut:
            type: string
            default: route
            enum: [route, mill, score, vgroove]
          retention:
            type: string
            default: tabs
            enum: [none, tabs, mouse_bites, tabs_with_mouse_bites]
          tabs: { type: integer, minimum: 0, default: 4 }
          tab_width:
            $ref: "units.yaml#/$defs/size"
            default: 2.0mm
          bite_holes: { type: integer, minimum: 1, default: 3 }
          vgroove_depth:
            $ref: "units.yaml#/$defs/percent_50_100"
            default: 80%
        required: [cut]
        allOf:
          - if:
              required: [cut]
              properties:
                cut: { const: vgroove }
            then:
              required: [vgroove_depth]
            else:
              not:
                required: [vgroove_depth]
        additionalProperties: false
      finishing:
        type: object
        default:
          clearance: 0.1mm
          direction: climb
        properties:
          clearance:
            $ref: "units.yaml#/$defs/size"
            default: 0.1mm
          direction:
            type: string
            default: climb
            enum: [conventional, climb]
        additionalProperties: false
    required: [edge]
    additionalProperties: false

properties:
  schema_version:
    type: integer
    const: 2
    default: 2

  id:
    description: Unique machining profile ID.
    $ref: "id.yaml#/$defs/uuid_v7"

  name:
    type: string
    minLength: 1
    default: My machining profile

  # Referenced profiles. Each is a `default` (the active reference) plus the
  # `choices` allowed for it. `$ref` keeps UUIDv7 validation; `x-ref` makes the
  # datastore resolve the value against the target profile collection.
  cnc:
    description: Selected CNC profile (default) plus allowed choices.
    type: object
    properties:
      default:
        description: Active CNC profile reference.
        $ref: "id.yaml#/$defs/uuid_v7"
        x-ref: "cnc.yaml"
      choices:
        type: array
        items:
          $ref: "id.yaml#/$defs/uuid_v7"
          x-ref: "cnc.yaml"
    required: [default, choices]
    additionalProperties: false

  fixture:
    description: Selected fixture profile (default) plus allowed choices.
    type: object
    properties:
      default:
        description: Active fixture profile reference.
        $ref: "id.yaml#/$defs/uuid_v7"
        x-ref: "fixture.yaml"
      choices:
        type: array
        items:
          $ref: "id.yaml#/$defs/uuid_v7"
          x-ref: "fixture.yaml"
    required: [default, choices]
    additionalProperties: false

  toolset:
    description: Selected toolset profile (default) plus allowed choices.
    type: object
    properties:
      default:
        description: Active toolset profile reference.
        $ref: "id.yaml#/$defs/uuid_v7"
        x-ref: "toolset.yaml"
      choices:
        type: array
        items:
          $ref: "id.yaml#/$defs/uuid_v7"
          x-ref: "toolset.yaml"
    required: [default, choices]
    additionalProperties: false

  side_to_machine:
    type: string
    enum: [top, bottom]
    default: top

  operations:
    type: array
    items: { $ref: "#/$defs/operation_key" }
    uniqueItems: true
    minItems: 1
    default: [drill_pth]

  routing:
    type: object
    default:
      cut_depth_strategy: automatic
      multi_pass_max_depth: 1.0mm
    properties:
      cut_depth_strategy:
        type: string
        enum: [automatic, single_pass, multi_pass]
        default: automatic
      multi_pass_max_depth:
        $ref: "units.yaml#/$defs/size"
        default: 1.0mm
    additionalProperties: false

  drill_locating_pins:
    type: object
    default: {}
    additionalProperties: false

  drill_pth:
    $ref: "#/$defs/drill_holes_common"
    default:
      holes:
        route_fallback: false
        drill_first: true
        pilot: false
        oblong: drill_ends_then_route

  drill_npth:
    $ref: "#/$defs/drill_holes_common"
    default:
      holes:
        route_fallback: false
        drill_first: true
        pilot: false
        oblong: drill_ends_then_route

  route_board:
    $ref: "#/$defs/route_board"
    default:
      edge:
        cut: route
        retention: tabs
        tabs: 4
        tab_width: 2.0mm
        bite_holes: 3
      finishing:
        clearance: 0.1mm
        direction: climb

  mill_board:
    type: object
    default:
      finishing:
        clearance: 0.1mm
        direction: climb
    properties:
      finishing:
        type: object
        properties:
          clearance:
            $ref: "units.yaml#/$defs/size"
            default: 0.1mm
          direction:
            type: string
            default: climb
            enum: [conventional, climb]
        additionalProperties: false
    additionalProperties: false

required: [id, name, cnc, fixture, toolset, operations]

# Note: the per-operation config objects (drill_pth, route_board, …) are declared
# as optional properties with defaults and are always materialised by the loader,
# so they are NOT gated behind conditional-presence rules. The `operations` array
# is the single source of truth for which operations are enabled; a config object
# being present does not imply its operation is active.

additionalProperties: false
