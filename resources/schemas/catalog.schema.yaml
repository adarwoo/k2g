$schema: "http://json-schema.org/draft-07/schema#"
type: object
description: |
  Tool catalog file. Contains drillbit, routerbit, engraver, and vbit entries grouped into
  named sections (e.g. product series).

  Dimensions and machining parameters must be entered as strings with explicit
  units so values remain unambiguous and preserve their native representation.

    diameter       mm|in
    flute_length   mm|in
    point_angle    deg
    z_min_depth    mm|in
    spindle        rpm
    feeds          mm/min|cm/min|m/min|in/min|ipm

  When a catalog is loaded its entries are prefixed with the file stem in
  square brackets to prevent ID clashes across catalogs, e.g.:
    [kyocera] Series 100 / 0.20mm

required: [name, sections]
additionalProperties: true

properties:
  name:
    type: string
    minLength: 1
    description: "Vendor or catalog name (e.g. \"Kyocera\", \"Generic\")"

  description:
    type: string
    description: "Optional free-text description of the catalog"

  sections:
    type: array
    description: "Tool sections — one per product series or category"
    minItems: 1
    items:
      $ref: "#/definitions/section"

definitions:
  length_with_unit:
    type: string
    minLength: 2
    pattern: '^\s*[+-]?(?:\d+(?:\.\d+)?|\d*\.\d+|\d+(?:\.\d+)?\s*/\s*\d+)\s*(?:mm|in|mil|thou|um|nm|cm)\s*$'

  angle_with_unit:
    type: string
    minLength: 2
    pattern: '^\s*[+-]?(?:\d+(?:\.\d+)?|\d*\.\d+|\d+(?:\.\d+)?\s*/\s*\d+)\s*(?:deg|°|rad)\s*$'

  feed_rate_with_unit:
    type: string
    minLength: 3
    pattern: '^\s*[+-]?(?:\d+(?:\.\d+)?|\d*\.\d+|\d+(?:\.\d+)?\s*/\s*\d+)\s*(?:mm\s*/\s*min|cm\s*/\s*min|m\s*/\s*min|in\s*/\s*min|inch\s*/\s*min|ipm)\s*$'

  rpm_with_unit:
    type: string
    minLength: 4
    pattern: '^\s*[+-]?(?:\d+(?:\.\d+)?|\d*\.\d+|\d+(?:\.\d+)?\s*/\s*\d+)\s*rpm\s*$'

  section:
    type: object
    required: [name, tools]
    additionalProperties: true
    properties:
      name:
        type: string
        minLength: 1
        description: "Section name (e.g. \"Series 100\", \"Router bits\")"

      default_flute_length_unit:
        type: string
        enum: [mm, in]
        description: "Optional default unit used by tool.flute_length in this section"

      description:
        type: string
        description: "Optional description of this section"

      tools:
        type: array
        description: "List of tools in this section (may be empty)"
        items:
          $ref: "#/definitions/tool"

  tool:
    type: object
    required: [type, diameter, point_angle, z_min_depth]
    additionalProperties: true
    description: "A single catalog tool entry"
    properties:
      manufacturer:
        type: [string, "null"]
        description: "Tool manufacturer name"

      sku:
        type: [string, "null"]
        minLength: 1
        description: "Manufacturer SKU or part number"

      type:
        type: string
        enum: [drillbit, routerbit, engraver, vbit]
        description: "Tool type discriminator"

      diameter:
        $ref: "#/definitions/length_with_unit"
        description: "Nominal tool diameter as a native length with explicit unit"

      flute_length:
        $ref: "#/definitions/length_with_unit"
        description: "Flute length as a native length with explicit unit"

      sku_name:
        type: string
        minLength: 1
        description: "Legacy combined identifier (deprecated alias of SKU/name)"

      point_angle:
        $ref: "#/definitions/angle_with_unit"
        description: "Tool point angle with explicit unit (typically deg)"

      z_min_depth:
        $ref: "#/definitions/length_with_unit"
        description: "Minimum depth to exit the hole cleanly with explicit unit"

      spindle_rpm:
        $ref: "#/definitions/rpm_with_unit"
        description: "Recommended spindle speed with explicit rpm unit"

      z_feed:
        $ref: "#/definitions/feed_rate_with_unit"
        description: "Recommended Z-axis (plunge) feed rate with explicit unit"

      table_feed:
        $ref: "#/definitions/feed_rate_with_unit"
        description: "Recommended XY table feed rate with explicit unit"

      tip_diameter:
        $ref: "#/definitions/length_with_unit"
        description: "Tip diameter with explicit unit (important for engraver and v-bit tools)"

      max_hits:
        type: integer
        minimum: 1
        description: "Maximum recommended hit count before tool change"

      notes:
        type: string
        description: "Free-text note (substrate, coating, condition, caveat, etc.)"

      referenced:
        type: boolean
        description: "Optional flag indicating the catalog entry is currently referenced by stock/projects"
        default: false

    allOf:
      - if:
          properties:
            type:
              const: drillbit
        then:
          required: [spindle_rpm, z_feed, max_hits]
      - if:
          properties:
            type:
              const: routerbit
        then:
          required: [spindle_rpm, z_feed, table_feed]
      - if:
          properties:
            type:
              const: engraver
        then:
          required: [spindle_rpm, z_feed, table_feed, tip_diameter]
      - if:
          properties:
            type:
              const: vbit
        then:
          required: [spindle_rpm, z_feed, table_feed, tip_diameter]

