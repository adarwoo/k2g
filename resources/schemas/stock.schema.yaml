$schema: "http://json-schema.org/draft-07/schema#"
type: "object"
description: "Persisted tool stock inventory configuration"
properties:
  tools:
    description: "List of tools in the current stock inventory"
    type: "array"
    default: []
    items:
      type: "object"
      description: "A single tool in stock"
      properties:
        id:
          type: "string"
          description: "Unique identifier for this tool"
          minLength: 1
        name:
          type: "string"
          description: "Display name (e.g., '0.8mm Carbide Drill', '1.0mm End Mill')"
          minLength: 1
        kind:
          type: "string"
          description: "Tool family (e.g., 'Drill', 'Router', 'Endmill', 'Engraver', 'VBit')"
          minLength: 1
          enum: [Drill, Router, Endmill, Engraver, VBit]
        source_sku:
          type: ["string", "null"]
          description: "Catalog source SKU (read-only when catalog-derived)"
        auto_summary:
          type: ["string", "null"]
          description: "Auto-generated summary (type + diameter)"
        diameter_mm:
          type: "number"
          description: "Tool diameter in millimeters"
          minimum: 0
        feed_rate_mm_min:
          type: ["number", "null"]
          description: "Deprecated generic feed rate in mm/min; prefer z_feed_rate_mm_min and table_feed_rate_mm_min"
          minimum: 0
        z_feed_rate_mm_min:
          type: ["number", "null"]
          description: "Recommended Z feed (plunge) in mm/min, or null if unspecified"
          minimum: 0
        table_feed_rate_mm_min:
          type: ["number", "null"]
          description: "Recommended XY/table feed in mm/min, or null if unspecified"
          minimum: 0
        spindle_rpm:
          type: ["number", "null"]
          description: "Recommended spindle speed in RPM, or null if unspecified"
          minimum: 0
        point_angle_deg:
          type: ["number", "null"]
          description: "Tool point angle in degrees (important for drills, engravers, and v-bits)"
          minimum: 0
          maximum: 360
        tip_diameter_mm:
          type: ["number", "null"]
          description: "Tip diameter in millimeters (important for engravers and v-bits)"
          minimum: 0
        flute_length_mm:
          type: ["number", "null"]
          description: "Flute length in millimeters, or null if unspecified"
          minimum: 0
        min_depth_mm:
          type: ["number", "null"]
          description: "Minimum recommended depth in millimeters, or null if unspecified"
          minimum: 0
        max_hits:
          type: ["integer", "null"]
          description: "Maximum recommended hit count before tool change"
          minimum: 1
        availability:
          type: "string"
          description: "Availability status"
          enum: ["in_stock", "out_of_stock"]
          default: "in_stock"
        preference:
          type: "string"
          description: "Selection preference property"
          enum: ["preferred", "neutral", "not_preferred"]
          default: "neutral"
        expected_in_rack:
          type: "boolean"
          description: "ATC indicator for expected rack presence"
          default: false
        operation_counter:
          type: "object"
          description: "Resettable operation counter"
          properties:
            routing_distance_mm:
              type: ["number", "null"]
              minimum: 0
              description: "Cumulative routing distance for routers/end mills"
            holes_drilled:
              type: ["integer", "null"]
              minimum: 0
              description: "Hole count for drill bits"
          additionalProperties: false
        manufacturer:
          type: ["string", "null"]
          description: "Tool manufacturer name (optional)"
        sku:
          type: ["string", "null"]
          description: "Manufacturer SKU or part number (optional)"
        addition_precedence:
          type: ["integer", "null"]
          description: "Internal insertion precedence for deterministic ordering; not shown as a table column"
          minimum: 0
      required: [id, name, kind, diameter_mm, availability, preference, expected_in_rack, operation_counter]
      additionalProperties: false

required: [tools]
additionalProperties: false
