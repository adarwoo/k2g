$schema: http://json-schema.org/draft-07/schema#
type: object
description: |
  This file controls the emitted GCode templates for the Masso G3 profile.

  Templates are evaluated through the application's RHAI expression path.
  Template text may include placeholders in braces, for example {x}, {y}, {z_safe}.

  All dimensional fields (lengths, feed rates, spindle speeds) are expressed as
  unit-bearing strings so the file is self-describing and unit-system agnostic.
  Examples:
    length     : "300mm"  or  "11 3/4in"  or  "1/16in"
    feed rate  : "2000mm/min"  or  "78.74in/min"
    spindle RPM: "24000rpm"

properties:
  machine:
    description: Physical machine configuration.
    type: object
    properties:
      fixture_plate:
        description: Maximum usable fixture plate size.
        type: object
        properties:
          x:
            description: Maximum X axis travel (unit-bearing string, e.g. "300mm" or "11.81in").
            type: string
            pattern: '^\s*[+-]?(?:\d+(?:\.\d+)?|\d*\.\d+|\d+(?:\.\d+)?\s*/\s*\d+)\s*(?:mm|cm|m|in|inch|")\s*$'
            default: "300mm"
          y:
            description: Maximum Y axis travel (unit-bearing string, e.g. "200mm" or "7.87in").
            type: string
            pattern: '^\s*[+-]?(?:\d+(?:\.\d+)?|\d*\.\d+|\d+(?:\.\d+)?\s*/\s*\d+)\s*(?:mm|cm|m|in|inch|")\s*$'
            default: "200mm"
        required: [x, y]
      max_feed_rate:
        description: Maximum feed rate (unit-bearing string, e.g. "2000mm/min" or "78.74in/min").
        type: string
        pattern: '^\s*[+-]?(?:\d+(?:\.\d+)?|\d*\.\d+|\d+(?:\.\d+)?\s*/\s*\d+)\s*(?:mm\s*/\s*min|cm\s*/\s*min|m\s*/\s*min|in\s*/\s*min|inch\s*/\s*min|ipm)\s*$'
        default: "2000mm/min"
      spindle_rpm_min:
        description: Minimum spindle speed (unit-bearing string, e.g. "1000rpm").
        type: string
        pattern: '^\s*[+-]?(?:\d+(?:\.\d+)?|\d*\.\d+|\d+(?:\.\d+)?\s*/\s*\d+)\s*rpm\s*$'
        default: "1000rpm"
      spindle_rpm_max:
        description: Maximum spindle speed (unit-bearing string, e.g. "24000rpm").
        type: string
        pattern: '^\s*[+-]?(?:\d+(?:\.\d+)?|\d*\.\d+|\d+(?:\.\d+)?\s*/\s*\d+)\s*rpm\s*$'
        default: "24000rpm"
      spindle_start_delay_s:
        description: Delay in seconds after spindle start before machining moves.
        type: number
        minimum: 0
        default: 0
      spindle_stop_delay_s:
        description: Delay in seconds after spindle stop before tool change or conclude.
        type: number
        minimum: 0
        default: 0
      atc_slot_count:
        description: Number of ATC slots. 0 means ATC is disabled (manual tool change only).
        type: integer
        minimum: 0
        default: 0
      origin:
        description: Machine coordinate origin orientation.
        type: object
        properties:
          x0:
            description: X axis zero orientation.
            type: string
            enum: [Left, Right, Front, Back]
            default: Left
          y0:
            description: Y axis zero orientation.
            type: string
            enum: [Front, Back, Left, Right]
            default: Front
        required: [x0, y0]
      scaling:
        description: Axis scaling in percent. Default is 100.0 for both axes (no scaling).
        type: object
        properties:
          x:
            description: X axis scaling percentage.
            type: number
            default: 100.0
          y:
            description: Y axis scaling percentage.
            type: number
            default: 100.0
        required: [x, y]
      line_numbering:
        description: Program line numbering configuration.
        type: object
        properties:
          enabled:
            description: Whether to emit line numbers in the generated program.
            type: boolean
            default: false
          increment:
            description: Line number increment value (e.g. 10 produces N10, N20, N30...).
            type: integer
            minimum: 1
            default: 10
        required: [enabled, increment]
      resolution:
        description: |
          Specify the best achievable resolution on the CNC
          All numbers will be rounded to this resolution going forward.
          The value defaults to um
        unit: length(um)
      anyOf:
        - type: number
        - &length_string
          type: "string"
          pattern: "^(?:\\d+(?:\\.\\d+)?|\\d+\\/\\d+)(?:nm|um|mm|cm|in|inch|mil|thou)$"
      default: 1um

    required: [fixture_plate, max_feed_rate, spindle_rpm_min, spindle_rpm_max, spindle_start_delay_s, spindle_stop_delay_s, atc_slot_count, origin, scaling, line_numbering, resolution]

  primitives:
    description: Primitive templates evaluated through RHAI for CNC-specific GCode emission.
    type: object
    properties:
      initialise:
        description: Program initialization block.
        type: string
        default: |
          (Created by kicad2gcode from '{pcb_filename}' - {timestamp})
          (Reset all back to safe defaults)
          G17 G54 G40 G49 G80 G90
          G21
          G10 P0
          (Establish the Z-Safe)
          G0 Z{z_safe}
      move_slow:
        description: Positioning move primitive.
        type: string
        default: G0 X{x} Y{y}
      start_spindle:
        description: Start spindle primitive.
        type: string
        default: S{rpm}\nM03
      stop_spindle:
        description: Stop spindle primitive.
        type: string
        default: M05
      drill:
        description: Drill primitive template.
        type: string
        default: G81 X{x} Y{y} Z{z_bottom} R{z_retract} F{z_feedrate}
      peck_drill:
        description: Peck drill primitive template.
        type: string
        default: G83 X{x} Y{y} Z{z_bottom} R{z_retract} Q{peck} F{z_feedrate}
      cut_arc:
        description: Arc cutting primitive template.
        type: string
        default: "{arc_cmd} X{x} Y{y} I{i} J{j} F{xy_feedrate}"
      cut_bezier:
        description: Bezier primitive template. May be native or an arc-approximation sequence.
        type: string
        default: |
          ; cut_bezier fallback
          ; implementation may expand into one or more arc segments
      change_tool:
        description: Tool change primitive template.
        type: string
        default: |
          M05
          {manual_message}
          T{slot} M06
          S{rpm}
      conclude:
        description: Program conclude/finalization block.
        type: string
        default: |
          (end of file)
      pause:
        description: Optional pause/message insertion primitive.
        type: string
        default: |
          MSG {message}
          M01
      banner:
        description: Optional comment/banner insertion primitive.
        type: string
        default: ( {text} )
    required: [initialise, move_slow, start_spindle, stop_spindle, drill, peck_drill, cut_arc, cut_bezier, change_tool, conclude]

required: [machine, primitives]
