$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "stock.yaml"
x-schema-version: 1

title: Tool Stock
description: >
  Persisted user tool stock inventory. Stock items are application-managed
  records, usually created from catalog tools, then customized by the user.

  Each stock item has its own UUIDv7 id because it is mutable user-owned state.
  Each stock item also keeps a mandatory reference back to the originating
  catalog item using that catalog tool's UUIDv7. This allows the application to
  re-link to the catalog item when available, undo local overrides, or add the
  catalog tool again if a referenced stock tool is missing from an old project.

  A stock item also stores a full catalog snapshot under `base`. This makes the
  tool operational even if the source catalog file is missing or the catalog
  item can no longer be found. In that case the tool is considered orphaned, but
  still usable because all important tool characteristics are persisted locally.

  Local user changes are stored under `overrides`. Effective values are resolved
  by taking the referenced catalog item when available, otherwise the local
  `base` snapshot, then applying `overrides`.

  This schema references shared definitions from files located in the same
  directory:
    - id.yaml
    - units.yaml

type: object

$defs:

  # ---------------------------------------------------------------------------
  # catalog_ref
  # ---------------------------------------------------------------------------
  # Mandatory reference back to the source catalog item.
  #
  # Fields:
  #   catalog
  #     Catalog identifier, typically the catalog file stem or catalog name.
  #
  #   tool_id
  #     UUIDv7 of the tool entry inside the catalog.
  #
  #   section
  #     Optional catalog section name, kept for display/debugging.
  #
  #   sku
  #     Optional manufacturer SKU, kept for display and search.
  #
  # If the catalog is missing or the UUID cannot be found, the stock item remains
  # usable through its `base` snapshot and local `overrides`.
  #
  catalog_ref:
    type: object
    properties:
      catalog:
        type: string
        minLength: 1
        description: Source catalog identifier, usually file stem or catalog name.
      tool_id:
        description: UUIDv7 of the referenced catalog tool item.
        $ref: "id.yaml#/$defs/uuid_v7"
      section:
        anyOf:
          - type: string
            minLength: 1
          - type: "null"
        description: Optional catalog section, series, or product family.
      sku:
        anyOf:
          - type: string
            minLength: 1
          - type: "null"
        description: Optional manufacturer SKU or part number.
    required: [catalog, tool_id]
    additionalProperties: false

  # ---------------------------------------------------------------------------
  # tool_values
  # ---------------------------------------------------------------------------
  # Tool characteristics and recommended machining parameters.
  #
  # Used both for:
  #   - base: persisted catalog snapshot
  #   - overrides: user-customized local values
  #
  # For `base`, the application should store the complete catalog-derived tool
  # definition needed to keep the stock item operational if the catalog is
  # missing.
  #
  # For `overrides`, fields are optional. A missing field means inherit from the
  # current catalog item when available, otherwise inherit from `base`.
  #
  tool_values:
    type: object
    properties:

      # Display name.
      name:
        type: string
        minLength: 1
        description: Tool display name.

      # Tool type/family.
      kind:
        type: string
        enum: [drillbit, routerbit, endmill, engraver, vbit]
        description: Tool family/type.

      # Manufacturer and SKU metadata.
      manufacturer:
        anyOf:
          - type: string
            minLength: 1
          - type: "null"
        description: Manufacturer name.
      sku:
        anyOf:
          - type: string
            minLength: 1
          - type: "null"
        description: Manufacturer SKU or part number.

      # Geometry.
      diameter:
        description: Nominal tool diameter.
        $ref: "units.yaml#/$defs/size"
      tip_diameter:
        anyOf:
          - $ref: "units.yaml#/$defs/size"
          - type: "null"
        description: Tip diameter, important for engravers and V-bits.
      flute_length:
        anyOf:
          - $ref: "units.yaml#/$defs/size"
          - type: "null"
        description: Flute length.
      z_min_depth:
        anyOf:
          - $ref: "units.yaml#/$defs/size"
          - type: "null"
        description: Minimum useful/recommended cutting or drilling depth.
      point_angle:
        anyOf:
          - $ref: "units.yaml#/$defs/angle"
          - type: "null"
        description: Tool point angle.

      # Recommended machining parameters.
      spindle:
        anyOf:
          - $ref: "units.yaml#/$defs/rpm"
          - type: "null"
        description: Recommended spindle speed.
      z_feed:
        anyOf:
          - $ref: "units.yaml#/$defs/feed"
          - type: "null"
        description: Recommended Z/plunge feed.
      table_feed:
        anyOf:
          - $ref: "units.yaml#/$defs/feed"
          - type: "null"
        description: Recommended XY/table feed.

      # Free-text note.
      notes:
        anyOf:
          - type: string
          - type: "null"
        description: Notes about material, coating, conditions, or caveats.

    additionalProperties: false

properties:

  # Version of this schema
  schema_version:
    type: integer
    const: 1
    description: Schema/data format version for this file.

  # ---------------------------------------------------------------------------
  # tools
  # ---------------------------------------------------------------------------
  # List of tools in the current stock inventory.
  #
  tools:
    type: array
    default: []
    description: List of tools in the current stock inventory.
    items:
      type: object
      description: A single user-managed stock tool.
      properties:

        # Local stock item ID.
        #
        id:
          description: Unique application-managed stock item ID.
          $ref: "id.yaml#/$defs/uuid_v7"

        # Reference back to the originating catalog item.
        #
        ref:
          description: Reference to the originating catalog tool item.
          $ref: "#/$defs/catalog_ref"

        # Persisted catalog snapshot.
        #
        # This is what keeps the stock item operational if the catalog or item
        # cannot be found later.
        #
        base:
          description: Catalog-derived snapshot stored with the stock item.
          $ref: "#/$defs/tool_values"

        # Local user overrides.
        #
        # Missing fields inherit from current catalog item if available,
        # otherwise from base.
        #
        overrides:
          description: User overrides relative to catalog/base values.
          $ref: "#/$defs/tool_values"
          default: {}

        # Cached/generated summary for display.
        summary:
          anyOf:
            - type: string
            - type: "null"
          description: Cached or auto-generated summary such as type plus diameter.

        # Stock availability.
        availability:
          type: string
          enum: [in_stock, out_of_stock]
          default: in_stock
          description: Availability status in the user's stock.

        # Automatic selection preference.
        preference:
          type: string
          enum: [preferred, neutral, not_preferred]
          default: neutral
          description: Selection preference for automatic matching.

        # Internal insertion order for deterministic display.
        order:
          anyOf:
            - type: integer
              minimum: 0
            - type: "null"
          description: Internal insertion precedence for deterministic ordering.

      required:
        - id
        - ref
        - base
        - availability
        - preference
      additionalProperties: false

required:
  - tools

additionalProperties: false
