# Genmitsu 3018-Pro
# Entry-level 3-axis CNC router with a 300x180mm work area.
# Uses a small BLDC spindle with a limited speed range.
# No ATC - manual tool change only.
# Feed rates are conservative due to the machine's lightweight frame.

name: "Genmitsu 3018-Pro"

machine:
  fixture_plate:
    x: "300mm"
    y: "180mm"
  max_feed_rate: "1200mm/min"
  spindle_rpm_min: "1000rpm"
  spindle_rpm_max: "10000rpm"
  atc_slot_count: 0
  origin:
    x0: Left
    y0: Front
  scaling:
    x: 100.0
    y: 100.0
  line_numbering_increment: 10
  program_units:
    length: "mm"
    feedrate: "mm/min"

primitives:
  initialise: |
    (Created by kicad2gcode from '{pcb_filename}' - {timestamp})
    (Reset all back to safe defaults)
    G17 G54 G40 G49 G80 G90
    G21
    G10 P0
    (Establish the Z-Safe)
    G0 Z{z_safe}
  move_slow: "G0 X{x} Y{y}"
  start_spindle: |
    S{rpm}
    M03
  stop_spindle: "M05"
  drill: "G81 X{x} Y{y} Z{z_bottom} R{z_retract} F{z_feedrate}"
  peck_drill: "G83 X{x} Y{y} Z{z_bottom} R{z_retract} Q{peck} F{z_feedrate}"
  cut_arc: "{arc_cmd} X{x} Y{y} I{i} J{j} F{xy_feedrate}"
  cut_bezier: |
    ; cut_bezier fallback
    ; implementation may expand into one or more arc segments
  change_tool: |
    M05
    {manual_message}
    T{slot} M06
    S{rpm}
  conclude: |
    (end of file)
  pause: |
    MSG {message}
    M01
  banner: "( {text} )"
