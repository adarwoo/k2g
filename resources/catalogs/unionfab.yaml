  Speed/feed data derived from the Union Tool FR4 application guide for
  spindles up to 100 kRPM (double-sided 1.6 mm FR4).
  Reference: https://www.uniontool.co.jp/assets/pdf/product/drill_router/06fr4_100k_ds-4l.pdf
  NOTE — entries with diameter < 0.4 mm carry placeholder speeds from the
  source table; verify against the manufacturer datasheet before use.

