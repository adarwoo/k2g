  - name: Router bits
    default_flute_length_unit: mm
    description: Metric sizes — conservative parameters for PCB outline routing in FR4
    tools:
      - { type: routerbit, diameter: '0.80mm',  spindle_rpm: '32000rpm', table_feed:  '400mm/min', z_feed: '150mm/min', sku_name: 'generic-Routerbits-R0.80', point_angle: '180deg' }
