name: Generic
description: >
  Generic metric PCB tooling with conservative machining parameters.
  Suitable as a starting point when manufacturer datasheets are unavailable.
  All values should be calibrated to your substrate, machine, and tool brand
  before production use.

sections:
  - name: Drillbits
    default_flute_length_unit: mm
    description: Metric sizes — conservative parameters for unbranded carbide PCB drills
    tools:
      - { type: drillbit, diameter: '0.30mm',  spindle_rpm:  '60000rpm', z_feed:  '1500mm/min', sku_name: 'generic-Drillbits-D0.30', point_angle: '130deg', max_hits: 2000 }
      - { type: drillbit, diameter: '0.40mm',  spindle_rpm:  '50000rpm', z_feed:  '1500mm/min', sku_name: 'generic-Drillbits-D0.40', point_angle: '130deg', max_hits: 2000 }
      - { type: drillbit, diameter: '0.50mm',  spindle_rpm:  '40000rpm', z_feed:  '1600mm/min', sku_name: 'generic-Drillbits-D0.50', point_angle: '130deg', max_hits: 2000 }
      - { type: drillbit, diameter: '0.60mm',  spindle_rpm:  '35000rpm', z_feed:  '1750mm/min', sku_name: 'generic-Drillbits-D0.60', point_angle: '130deg', max_hits: 2000 }
      - { type: drillbit, diameter: '0.70mm',  spindle_rpm:  '30000rpm', z_feed:  '1800mm/min', sku_name: 'generic-Drillbits-D0.70', point_angle: '130deg', max_hits: 2000 }
