header:
    - "(Created by kicad2gcode from '@pcb_filename' - @timestamp)"
    - "(Reset all back to safe defaults)"
    - "G17 G54 G40 G49 G80 G90"
    - "G21"
    - "G10 P0"
    - "(Establish the Z-Safe)"
    - "G0 Z@gs::z_safe_height::mm"

footer:
    - "(end of file)"

drill_hole:
    first:
        - "G0 X@x::mm Y@y::mm Z@gs::z_safe_height::mm"
        - test: "@last_index == @index"
            true:
                - "G98"
            false:
                - "G99"
        - "G81 Z@z_bottom::mm R@z_retract::mm F@z_feedrate::mm_min"
    next:
        - "X@x::mm Y@y::mm"
    cancel:
        - test: "@last_index == @index"
            true:
                - "G80"

route_hole:
    - "G90 G0 X@x::mm Y@y::mm"
    - "G1 Z@z_bottom::mm F@z_feedrate::mm_min"
    - "G1 Y@y_plus_id::mm"
    - test: "@cutdir == UP_OR_UPDOWN"
        true:
            - "G2 I0 J-@id::mm"
        false:
            - "G3 I0 J-@id::mm"
    - "G0 Z@z_safe::mm"

change_tool:
    - "M05"
    - test: "@rack::is_manual == true"
        true:
            - "MSG Load @tool::name @tool::diameter"
            - "M01"
    - "T@slot M06"
    - "S@tool::rpm::rpm"
