$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "id.yaml"

$defs:
  uuid_v7:
    type: string
    format: uuid
    pattern: '^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-7[0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$'

  uuid_v7_or_null:
    anyOf:
      - type: "null"
      - $ref: "#/$defs/uuid_v7"
