machine:
  fixture_plate:
    x: 300.0
    y: 200.0
  max_feed_rate: 2000.0
  spindle_rpm_min: 1000
  spindle_rpm_max: 24000
  atc_slot_count: 0
  origin:
    x0: Left
    y0: Front
  scaling:
    x: 100.0
    y: 100.0
  line_numbering:
    enabled: false
    increment: 10

header: |
  (Created by k2g from '{pcb_filename}' - {now().format("%Y-%m-%d %H:%M:%S")})
  (Reset all back to safe defaults)
  G17 G54 G40 G49 G80 G90
  G21
  G10 P0
  (Establish the Z-Safe)
  G0 Z{z_safe}

footer: |
  (end of file)

drill:
  first_move: G0 X{x.mm} Y{y.mm} Z{z_safe.mm}
  cycle_mode_last: G98
  cycle_mode_series: G99
  cycle_start: G81 Z{z_bottom.mm} R{z_retract.mm} F{z_feedrate.mm_min}
  next_hole: X{x.mm} Y{y.mm}
  cycle_cancel: G80

route:
  plunge_and_offset: |
    G90 G0 X{x.mm} Y{y.mm}
    G1 Z{z_bottom.mm} F{z_feedrate.mm_min}
    G1 Y{y_plus_id.mm}
  arc_up: G2 I0 J-{id.mm}
  arc_down: G3 I0 J-{id.mm}
  retract: G0 Z{z_safe.mm}

tool_change:
  manual_prompt: |
    MSG Load {tool_name} {tool_diameter}
    M01
  command: |
    M05
    {manual_message}
    T{slot} M06
    S{rpm}