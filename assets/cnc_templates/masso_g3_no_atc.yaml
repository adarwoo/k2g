# Masso G3 - Manual Tool Change
# Suitable for a standard Masso G3 build without an automatic tool changer.
# Operator is prompted to load each tool manually.
#
# Primitives use the GCode Template Language (see docs/gcode-template-language.md):
# a backtick line emits GCode, other lines are Rhai script, and {expr} in an emit
# line is evaluated and unit-converted. metric() emits G21 and fixes the unit.

name: "Masso G3 - Manual Tool Change"

machine:
  max_feed_rate: "2500mm/min"
  spindle_rpm_min: "5000rpm"
  spindle_rpm_max: "24000rpm"
  atc_slot_count: 0
  scaling:
    x: 1.0
    y: 1.0
  line_numbering_increment: 10

primitives:
  initialise: |
    `(Created by kicad2gcode from '{pcb_filename}' - {timestamp})
    `G17 G54 G40 G49 G80 G90
    metric();
    `G0 Z{z_safe}
  rapid_move: "`G0 X{x} Y{y} Z{z}"
  linear_cut: "`G1 X{x} Y{y} Z{z} S{s}"
  start_spindle: |
    `S{rpm}
    `M3
  stop_spindle: "`M5"
  drill: "`G81 X{x} Y{y} Z{z_bottom} R{z_retract} F{z_feedrate}"
  peck_drill: "`G83 X{x} Y{y} Z{z_bottom} R{z_retract} Q{peck} F{z_feedrate}"
  cut_arc: "`{arc_cmd} X{x} Y{y} I{i} J{j} F{xy_feedrate}"
  cut_bezier: |
    `; cut_bezier fallback
  change_tool: |
    `M5
    `{manual_message}
    `T{slot} M6
    `S{rpm}
  conclude: |
    `(end of file)
    `G0 Z{z_safe}
    `G0 X0 Y0
  pause: |
    `MSG {message}
    `M1
  banner: "`( {text} )"
